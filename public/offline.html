<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Zeleni Svet</title>
    <style>
      :root {
        --bg: #f7faf8;
        --card: #ffffff;
        --accent: #266041;
        --text: #1f2937;
        --muted: #6b7280;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 10% 10%, #e7f3eb 0%, var(--bg) 45%);
        display: grid;
        place-items: center;
        font-family: Montserrat, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--text);
        padding: 24px;
      }
      .card {
        width: min(540px, 100%);
        background: var(--card);
        border: 1px solid #d8e6dd;
        border-radius: 16px;
        box-shadow: 0 16px 32px rgba(38, 96, 65, 0.12);
        padding: 28px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: #e7f3eb;
        color: var(--accent);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 700;
      }
      h1 {
        margin: 14px 0 10px;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 15px;
      }
      .actions {
        margin-top: 22px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      button,
      a {
        border: 0;
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }
      .primary {
        background: var(--accent);
        color: #fff;
      }
      .ghost {
        background: #f3f4f6;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="badge">Zeleni Svet · Offline režim</span>
      <h1>Trenutno nema internet konekcije</h1>
      <p>
        Aplikacija će prikazati poslednje keširane stranice i sadržaj gde je to moguće.
        Kada se konekcija vrati, kliknite na osvežavanje.
      </p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Pokušaj ponovo</button>
        <a class="ghost" href="/">Početna</a>
      </div>
    </main>
  </body>
</html>
